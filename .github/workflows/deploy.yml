name: Deploy to SmarterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      # The pinned Tailwind CLI is git-ignored (108 MB); cache it so it isn't
      # re-downloaded every run. On a cache miss the build downloads it.
      - name: Cache Tailwind CLI
        uses: actions/cache@v4
        with:
          path: tools/tailwindcss.exe
          key: tailwind-v4.3.3-windows-x64

      - name: Ensure Web Deploy is available
        run: choco install webdeploy -y --no-progress

      # Plain publish to a folder — builds server + WASM client + runs Tailwind.
      # (No DeployOnBuild here, so nothing leaks into the client project.)
      - name: Publish
        run: dotnet publish heegarcom/heegarcom.csproj -c Release -o publish

      # Deploy the published folder with Web Deploy directly, via cmd so the
      # -dest:...,... argument (commas + quotes) isn't mangled by PowerShell.
      # Secrets are passed as env vars and expanded by cmd. AppOffline releases
      # locked DLLs; allowUntrusted covers the shared-host certificate.
      - name: Deploy via Web Deploy
        shell: cmd
        env:
          MSDEPLOY_SITE: ${{ secrets.MSDEPLOY_SITE }}
          MSDEPLOY_URL: ${{ secrets.MSDEPLOY_URL }}
          MSDEPLOY_USER: ${{ secrets.MSDEPLOY_USERNAME }}
          MSDEPLOY_PASS: ${{ secrets.MSDEPLOY_PASSWORD }}
        run: >
          "%ProgramFiles%\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          -verb:sync
          -source:contentPath="%GITHUB_WORKSPACE%\publish"
          -dest:contentPath="%MSDEPLOY_SITE%",ComputerName="%MSDEPLOY_URL%",UserName="%MSDEPLOY_USER%",Password="%MSDEPLOY_PASS%",AuthType="Basic"
          -allowUntrusted
          -enableRule:AppOffline
