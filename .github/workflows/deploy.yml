name: Deploy to SmarterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      # The pinned Tailwind CLI is git-ignored (108 MB); cache it so it isn't
      # re-downloaded every run. On a cache miss the build downloads it.
      - name: Cache Tailwind CLI
        uses: actions/cache@v4
        with:
          path: tools/tailwindcss.exe
          key: tailwind-v4.3.3-windows-x64

      - name: Ensure Web Deploy is available
        run: choco install webdeploy -y --no-progress

      # Plain publish to a folder — builds server + WASM client + runs Tailwind.
      # (No DeployOnBuild here, so nothing leaks into the client project.)
      - name: Publish
        run: dotnet publish heegarcom/heegarcom.csproj -c Release -o publish

      # Deploy the published folder with Web Deploy directly.
      # AppOffline releases locked DLLs; allowUntrusted covers the shared-host cert.
      - name: Deploy via Web Deploy
        shell: pwsh
        run: |
          $msdeploy = "${env:ProgramFiles}\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          if (-not (Test-Path $msdeploy)) { throw "msdeploy.exe not found at $msdeploy" }
          & $msdeploy `
            -verb:sync `
            -source:contentPath="${{ github.workspace }}\publish" `
            -dest:contentPath="${{ secrets.MSDEPLOY_SITE }}",ComputerName="${{ secrets.MSDEPLOY_URL }}",UserName="${{ secrets.MSDEPLOY_USERNAME }}",Password="${{ secrets.MSDEPLOY_PASSWORD }}",AuthType="Basic" `
            -allowUntrusted `
            -enableRule:AppOffline
          if ($LASTEXITCODE -ne 0) { throw "Web Deploy failed with exit code $LASTEXITCODE" }
